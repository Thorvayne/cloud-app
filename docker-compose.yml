version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - cloud-network

  backend:
    build: ./backend
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_URLS: http://+:8081
    networks:
      - cloud-network

  db:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: cloud-db
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge

volumes:
  sql-data: